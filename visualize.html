<!DOCTYPE html>
<html>
<head>
    <title>Merkle Tree Visualizer</title>
<style>
body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 20px;
}


.header {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    border: 1px solid #334155;
    color: #38bdf8;
    padding: 25px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.header h1 {
    margin: 0;
    font-size: 28px;
}

.header p {
    margin: 5px 0 0;
    color: #94a3b8;
}


.card {
    background: #1e293b;
    margin: 20px auto;
    padding: 20px;
    width: 85%;
    border-radius: 10px;
    border: 1px solid #334155;
    box-shadow: 0 0 15px rgba(56,189,248,0.1);
}


input {
    padding: 10px;
    width: 260px;
    border: 1px solid #475569;
    border-radius: 6px;
    background: #0f172a;
    color: #e2e8f0;
    outline: none;
}

input:focus {
    border-color: #38bdf8;
    box-shadow: 0 0 6px rgba(56,189,248,0.5);
}


button {
    padding: 10px 16px;
    margin: 8px;
    border: none;
    border-radius: 6px;
    background: #38bdf8;
    color: #0f172a;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    background: #0ea5e9;
    transform: scale(1.05);
}


.node {
    border: 2px solid #38bdf8;
    padding: 10px;
    border-radius: 8px;
    background: #0f172a;
    box-shadow: 0 0 10px rgba(56,189,248,0.3);
}

.node.diff {
    border: 2px solid #ef4444;
    color: #ef4444;
    background: rgba(239,68,68,0.1);
    box-shadow: 0 0 10px rgba(239,68,68,0.5);
}


#logs div {
    background: #0f172a;
    border: 1px solid #334155;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    text-align: left;
}


#result {
    font-size: 18px;
    font-weight: bold;
    margin-top: 20px;
    color: #38bdf8;
}
</style>
</head>
<body>

<div class="header">
    <h1>🌳 Merkle Tree Visualizer</h1>
    <p>Efficient Data Verification using Hash Trees</p>
</div>

<div class="card">
    <h3>📥 Insert Data</h3>

    <input id="quickA" placeholder="Dataset A (tx1, tx2...)"><br><br>
    <input id="quickB" placeholder="Dataset B (tx1, tx2...)"><br><br>

    <button onclick="quickInsert()">Insert & Generate</button>
</div>

<div class="card">
    <h3>⚙️ Actions</h3>

    <button onclick="generate()">Generate Tree</button>
    <button onclick="syncData()">Sync Data</button>
    <button onclick="deleteLogs()">Clear Logs</button>
</div>


<div class="card">
    <h3>📊 Dataset 1</h3>
    <p id="values1"></p>
    <div id="network1" style="height:400px;"></div>
</div>

<div class="card">
    <h3>📊 Dataset 2</h3>
    <p id="values2"></p>
    <div id="network2" style="height:400px;"></div>
</div>

<h3 id="result"></h3>
<div class="card">
    <h3>📜 Sync Logs</h3>
    <div id="logs"></div>
</div>
<div class="card">
    <h3>🔍 Differences Detected</h3>
    <div id="diffBox">No differences yet</div>
</div>


<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<script>
let lastResponse = null;
let lastData1 = [];
let lastData2 = [];

function isDifferent(data, level, index) {
    const hash1 = data.levels[level][index]?.hash;
    const hash2 = window.compareData.levels[level][index]?.hash;

    return hash1 !== hash2;
}

function buildGraph(data, differences) {
    let nodes = [];
    let edges = [];
    let id = 1;

    let currentLevel = [];

    data.leaves.forEach((leaf, idx) => {
        const nodeId = id++;

    nodes.push({
        id: nodeId,
        label: leaf.hash.substring(0,6),
        color: differences.includes(idx) ? 'red' : '#97C2FC',
        level: data.levels.length + 1  
    });

        currentLevel.push(nodeId);
    });

    for (let level = 0; level < data.levels.length; level++) {
        let nextLevel = [];

        for (let i = 0; i < currentLevel.length; i += 2) {
            const left = currentLevel[i];
            const right = currentLevel[i + 1] || left;

            const nodeData = data.levels[level][Math.floor(i / 2)];
            const nodeId = id++;

            const isDiff =
                nodeData.hash !== window.compareData.levels[level][Math.floor(i / 2)]?.hash;

            nodes.push({
                id: nodeId,
                label: nodeData.hash.substring(0,6),
                color: isDiff ? 'red' : '#97C2FC',
                level: data.levels.length - level   
            });

            edges.push({ from: nodeId, to: left });
            edges.push({ from: nodeId, to: right });

            nextLevel.push(nodeId);
        }

        currentLevel = nextLevel;
    }

    return { nodes, edges };
}

function draw(containerId, data, differences) {
    const { nodes, edges } = buildGraph(data, differences);

    const container = document.getElementById(containerId);

    new vis.Network(container, {
        nodes: new vis.DataSet(nodes),
        edges: new vis.DataSet(edges)
    }, {
        layout: {
            hierarchical: {
                direction: "UD",
                levelSeparation: 120,
                nodeSpacing: 150,
                sortMethod: "directed"
            }
        },
        physics: {
            enabled: true,
            stabilization: false
        },
        
        interaction: {
            dragNodes: false,    
            dragView: false,      
            zoomView: false,
            selectable: false     
        }
    });
}

async function generate() {
    const res = await fetch('/api/merkle-compare', {
        method: 'POST'
    });

    const data = await res.json();

    // 🔥 SHOW VALUES
    document.getElementById("values1").innerText =
        "Values: " + data.dataset1.leaves.map(l => l.data).join(", ");

    document.getElementById("values2").innerText =
        "Values: " + data.dataset2.leaves.map(l => l.data).join(", ");

    // draw trees
    window.compareData = data.dataset2;
    draw("network1", data.dataset1, data.differences);

    window.compareData = data.dataset1;
    draw("network2", data.dataset2, data.differences);

    document.getElementById("result").innerText =
        "ROOT EQUAL: " + data.rootComparison.isEqual;

    lastResponse = data;  

// ===== DIFFERENCE BOX =====
const diffIndexes = data.differences;

if (diffIndexes.length === 0) {
    document.getElementById("diffBox").innerHTML = "✅ No differences";
} else {
    let diffText = "";

    diffIndexes.forEach(i => {
        const val1 = data.dataset1.leaves[i].data;
        const val2 = data.dataset2.leaves[i].data;

        diffText += `Index ${i}: "${val1}" → "${val2}"<br>`;
    });

    document.getElementById("diffBox").innerHTML = diffText;
}

// reset sync box when new generate runs
document.getElementById("syncBox").innerHTML = "No sync performed yet";
}

async function syncData() {
    const res = await fetch('/api/sync-db', {
        method: 'POST'
    });

    const data = await res.json();

    alert("Sync completed!");

    
    generate();
    loadLogs();
}

async function loadLogs() {
    const res = await fetch('/api/sync-logs');
    const logs = await res.json();

    let html = "";

    logs.forEach(log => {
        html += `
            <div style="border:1px solid #ccc; padding:10px; margin:10px;">
                <b>Time:</b> ${new Date(log.timestamp).toLocaleString()}<br>
                <b>Updated Indexes:</b> ${log.updatedIndexes}<br>
                <b>Before:</b> ${log.before.join(', ')}<br>
                <b>After:</b> ${log.after.join(', ')}
            </div>
        `;
    });

    document.getElementById("logs").innerHTML = html;
}

async function deleteLogs() {
    const res = await fetch('/api/sync-logs', {
        method: 'DELETE'
    });

    const data = await res.json();

    alert("Logs deleted!");

    // clear UI
    document.getElementById("logs").innerHTML = "";
}

async function quickInsert() {
    const dataA = document.getElementById('quickA').value.split(',');
    const dataB = document.getElementById('quickB').value.split(',');

    // insert dataset A
    await fetch('/api/insert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            datasetName: "A",
            values: dataA
        })
    });

    // insert dataset B
    await fetch('/api/insert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            datasetName: "B",
            values: dataB
        })
    });

    alert("Data inserted!");

    // auto generate tree
    generate();
}

window.onload = () => {
    loadLogs();
};
</script>

</body>
</html>
